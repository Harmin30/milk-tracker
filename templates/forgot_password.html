{% extends "base.html" %}
{% block content %}

<div class="card auth-card">

    <div class="auth-title">Reset Password 🔐</div>
    <div class="auth-subtitle">Enter your details to set a new password</div>

    <form method="POST">

        <!-- Mobile -->
        <div class="input-group-custom">
            <i class="fa-solid fa-phone"></i>
            <input 
                type="tel"
                name="mobile"
                class="form-control"
                placeholder="Mobile Number"
                pattern="[0-9]{10}"
                maxlength="10"
                inputmode="numeric"
                oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,10);"
                required>
        </div>

        <!-- New Password -->
        <div class="input-group-custom password-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input 
                type="password"
                name="password"
                id="resetPassword"
                class="form-control"
                placeholder="New Password"
                minlength="3"
                required>
            <span class="toggle-password" onclick="togglePassword('resetPassword', this)">👁</span>
        </div>

        <!-- Confirm Password -->
        <div class="input-group-custom password-wrapper">
            <i class="fa-solid fa-check"></i>
            <input 
                type="password"
                name="confirm_password"
                id="resetConfirmPassword"
                class="form-control"
                placeholder="Confirm Password"
                minlength="3"
                required>
            <span class="toggle-password" onclick="togglePassword('resetConfirmPassword', this)">👁</span>
        </div>

        <button type="submit" class="btn btn-warning w-100 auth-btn">
            Reset Password
        </button>

    </form>

    <div class="auth-footer">
        Remember your password?
        <a href="{{ url_for('login') }}">Back to Login</a>
    </div>

</div>

{% endblock %}
