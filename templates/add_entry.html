{% extends "base.html" %} {% block content %}

<div class="card shadow p-4">
  <h4 class="text-center mb-3">Add Milk Entry</h4>

  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Date</label>
      <input
        type="date"
        name="date"
        class="form-control"
        max="{{ datetime.today().strftime('%Y-%m-%d') }}"
        value="{{ datetime.today().strftime('%Y-%m-%d') }}"
        required
      />
    </div>

    <div class="mb-3">
      <label>Milk Type</label>
      <select name="milk_type" class="form-select" required>
        <option value="">Select Type</option>
        <option value="Buffalo">Buffalo</option>
        <option value="Cow">Cow</option>
      </select>
    </div>

    <div class="mb-3">
      <label>Liters</label>
      <input
        type="number"
        step="0.1"
        name="liters"
        class="form-control"
        required
      />
    </div>

    <div class="mb-3">
      <label>Price Per Liter</label>
      <input
        type="text"
        class="form-control"
        value="Auto based on profile"
        disabled
      />
    </div>

    <button type="submit" class="btn btn-success w-100">Add Entry</button>
  </form>
</div>

{% endblock %}
