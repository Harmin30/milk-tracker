{% extends "base.html" %}
{% block content %}

<div class="card auth-card">

    <div class="auth-title">Welcome Back 👋</div>
    <div class="auth-subtitle">Login to continue managing your milk records</div>

    <form method="POST">

        <!-- Mobile -->
        <div class="input-group-custom">
            <i class="fa-solid fa-phone"></i>
            <input 
                type="tel"
                name="mobile"
                class="form-control"
                placeholder="Mobile Number"
                pattern="[0-9]{10}"
                maxlength="10"
                inputmode="numeric"
                oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,10);"
                required>
        </div>

        <!-- Password -->
        <div class="input-group-custom password-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input 
                type="password"
                name="password"
                id="loginPassword"
                class="form-control"
                placeholder="Password"
                minlength="3"
                required>
            <span class="toggle-password" onclick="togglePassword('loginPassword', this)">👁</span>
        </div>

        <div class="form-check mb-3">
            <input type="checkbox" name="remember" class="form-check-input">
            <label class="form-check-label">Remember Me</label>
        </div>

        <button type="submit" class="btn btn-primary w-100 auth-btn">
            Login
        </button>
    </form>

    <div class="auth-footer">
        <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
        <br><br>
        Don’t have an account?
        <a href="{{ url_for('register') }}">Create Account</a>
    </div>

</div>

{% endblock %}
